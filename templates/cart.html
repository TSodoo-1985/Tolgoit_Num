{% extends "layout.html" %}
{% block content %}
<div class="card shadow-sm border-0 rounded-4">
    <div class="card-header bg-white py-3">
        <h5 class="fw-bold mb-0 text-primary"><i class="bi bi-cart-fill"></i> Миний сагс</h5>
    </div>
    
    <div class="card-body p-0">
        <div id="cart-list" class="list-group list-group-flush">
            </div>

        <div id="labor-section" class="p-3 bg-light border-top border-bottom">
            <h6 class="fw-bold mb-2 text-primary small text-uppercase">
                <i class="bi bi-person-gear-fill me-1"></i> Ажлын хөлс нэмэх
            </h6>
            <div class="row g-2">
                <div class="col-7">
                    <input type="text" id="labor_desc" class="form-control form-control-sm border-2" placeholder="Ажлын тайлбар (жишээ: Засвар)">
                </div>
                <div class="col-5">
                    <div class="input-group input-group-sm">
                        <input type="number" id="labor_amt" class="form-control border-2 fw-bold" placeholder="Дүн">
                        <button class="btn btn-primary" onclick="addLaborToCart()">
                            <i class="bi bi-plus-lg"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="misc-section" class="p-3 bg-white border-bottom">
            <h6 class="fw-bold mb-2 text-success small text-uppercase">
                <i class="bi bi-tag-fill me-1"></i> Бүртгэлгүй бараа нэмэх
            </h6>
            <div class="row g-2">
                <div class="col-7">
                    <input type="text" id="misc_name" class="form-control form-control-sm border-2 border-success-subtle" placeholder="Барааны нэр">
                </div>
                <div class="col-5">
                    <div class="input-group input-group-sm">
                        <input type="number" id="misc_price" class="form-control border-2 border-success-subtle fw-bold" placeholder="Үнэ">
                        <button class="btn btn-success" onclick="addMiscToCart()">
                            <i class="bi bi-plus-lg"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="cart-summary" class="p-3 bg-white border-bottom" style="display:none;">
            <div class="d-flex justify-content-between align-items-center mb-1">
                <span class="text-muted small fw-bold text-uppercase">Нийт ширхэг:</span>
                <span id="total-qty" class="fw-bold text-dark">0</span>
            </div>
            <div class="d-flex justify-content-between align-items-center">
                <span class="text-muted small fw-bold text-uppercase">Нийт дүн:</span>
                <span id="total-price" class="fw-bold text-primary fs-5">0₮</span>
            </div>
        </div>

        <div id="empty-msg" class="text-center py-5" style="display:none;">
            <i class="bi bi-cart-x display-1 text-muted"></i>
            <h5 class="text-muted mt-3">Сагс хоосон байна.</h5>
            <p class="text-muted small">Дээрх хэсэгт ажлын хөлс эсвэл бүртгэлгүй бараа нэмнэ үү.</p>
        </div>
    </div>

    <div class="card-footer bg-white p-3 d-flex justify-content-between align-items-center" id="cart-footer" style="display:none !important;">
        <button onclick="clearAll()" class="btn btn-outline-danger btn-sm">
            <i class="bi bi-trash"></i> Цэвэрлэх
        </button>
        <button type="button" class="btn btn-success px-4 fw-bold shadow-sm" data-bs-toggle="modal" data-bs-target="#paymentModal">
            <i class="bi bi-check-circle-fill"></i> БАТЛАХ
        </button>
    </div>
</div>

<div class="modal fade" id="paymentModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title fw-bold"><i class="bi bi-wallet2 me-2"></i>Төлбөр сонгох</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4 text-center">
                <p class="text-muted mb-4">Та төлбөр хүлээн авсан сувгаа сонгоно уу.</p>
                <div class="row g-3">
                    <div class="col-6">
                        <button class="btn btn-outline-success w-100 py-3 fw-bold" onclick="saveWithMethod('Бэлэн')">
                            <i class="bi bi-cash-stack d-block fs-3 mb-2"></i> БЭЛЭН
                        </button>
                    </div>
                    <div class="col-6">
                        <button class="btn btn-outline-primary w-100 py-3 fw-bold" onclick="saveWithMethod('Картаар')">
                            <i class="bi bi-credit-card d-block fs-3 mb-2"></i> КАРТААР
                        </button>
                    </div>
                    <div class="col-6">
                        <button class="btn btn-outline-info w-100 py-3 fw-bold" onclick="saveWithMethod('Дансаар')">
                            <i class="bi bi-bank d-block fs-3 mb-2"></i> ДАНСААР
                        </button>
                    </div>
                    <div class="col-6">
                        <button class="btn btn-outline-warning w-100 py-3 fw-bold" onclick="saveWithMethod('Компани')">
                            <i class="bi bi-building d-block fs-3 mb-2"></i> КОМПАНИ
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Ажлын хөлс нэмэх функц
    function addLaborToCart() {
        const desc = document.getElementById('labor_desc').value;
        const amount = document.getElementById('labor_amt').value;

        if (!desc || !amount) {
            alert("Ажлын тайлбар болон дүнг оруулна уу!");
            return;
        }

        let cart = JSON.parse(localStorage.getItem('myCart')) || [];
        
        cart.push({
            id: "LABOR_" + Date.now(),
            name: "[АЖЛЫН ХӨЛС] " + desc,
            price: parseFloat(amount),
            quantity: 1,
            type: "Зарлага",
            is_labor: true
        });

        localStorage.setItem('myCart', JSON.stringify(cart));
        document.getElementById('labor_desc').value = '';
        document.getElementById('labor_amt').value = '';
        render();
        if (window.updateBadge) window.updateBadge();
    }

    // Бүртгэлгүй бараа нэмэх функц
    function addMiscToCart() {
        const name = document.getElementById('misc_name').value;
        const price = document.getElementById('misc_price').value;

        if (!name || !price) {
            alert("Барааны нэр болон үнийг оруулна уу!");
            return;
        }

        let cart = JSON.parse(localStorage.getItem('myCart')) || [];
        
        cart.push({
            id: "MISC_" + Date.now(),
            name: "[БҮРТГЭЛГҮЙ] " + name,
            price: parseFloat(price),
            quantity: 1,
            type: "Зарлага",
            is_labor: true 
        });

        localStorage.setItem('myCart', JSON.stringify(cart));
        document.getElementById('misc_name').value = '';
        document.getElementById('misc_price').value = '';
        render();
        if (window.updateBadge) window.updateBadge();
    }

    // Тоо ширхэг өөрчлөх функцууд
    function updateQty(index, delta) {
        let cart = JSON.parse(localStorage.getItem('myCart')) || [];
        let newQty = (parseInt(cart[index].quantity) || 1) + delta;
        if (newQty < 1) newQty = 1;
        cart[index].quantity = newQty;
        localStorage.setItem('myCart', JSON.stringify(cart));
        render();
        if (window.updateBadge) window.updateBadge();
    }

    function changeQty(index, value) {
        let cart = JSON.parse(localStorage.getItem('myCart')) || [];
        let newQty = parseInt(value) || 1;
        if (newQty < 1) newQty = 1;
        cart[index].quantity = newQty;
        localStorage.setItem('myCart', JSON.stringify(cart));
        render();
        if (window.updateBadge) window.updateBadge();
    }

    function updateItemPrice(index, newPrice) {
        let cart = JSON.parse(localStorage.getItem('myCart')) || [];
        cart[index].price = parseFloat(newPrice) || 0;
        localStorage.setItem('myCart', JSON.stringify(cart));
        render();
    }

    function render() {
        let cart = JSON.parse(localStorage.getItem('myCart')) || [];
        const list = document.getElementById('cart-list');
        const msg = document.getElementById('empty-msg');
        const summary = document.getElementById('cart-summary');
        const footer = document.getElementById('cart-footer');

        if(cart.length === 0) {
            list.innerHTML = '';
            msg.style.display = 'block';
            summary.style.display = 'none';
            footer.setAttribute("style", "display: none !important");
            return;
        }
        
        msg.style.display = 'none';
        summary.style.display = 'block';
        footer.setAttribute("style", "display: flex !important");
        
        let totalQty = 0;
        let totalPrice = 0;

        list.innerHTML = cart.map((item, i) => {
            const qty = parseFloat(item.quantity) || 1;
            const price = parseFloat(item.price) || 0;
            const subtotal = qty * price;
            
            totalQty += qty;
            totalPrice += subtotal;

            let badgeClass = "bg-primary-subtle text-primary";
            let typeLabel = item.type || 'Зарлага';
            
            if (item.name.includes("[АЖЛЫН ХӨЛС]")) {
                badgeClass = "bg-info text-white";
                typeLabel = "Үйлчилгээ";
            } else if (item.name.includes("[БҮРТГЭЛГҮЙ]")) {
                badgeClass = "bg-success text-white";
                typeLabel = "Шууд орлого";
            }

            return `
                <div class="list-group-item p-3">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <div class="d-flex align-items-center gap-3">
                            <div class="bg-light rounded-circle d-flex align-items-center justify-content-center text-primary fw-bold" style="width: 35px; height: 35px; min-width: 35px;">
                                ${i + 1}
                            </div>
                            <div style="min-width: 0;">
                                <h6 class="mb-0 fw-bold text-truncate">${item.name}</h6>
                                <small>
                                    <span class="badge ${badgeClass}">${typeLabel}</span>
                                </small>
                            </div>
                        </div>
                        <button class="btn btn-link text-danger p-0" onclick="remove(${i})">
                            <i class="bi bi-x-lg"></i>
                        </button>
                    </div>
                    
                    <div class="row g-2 align-items-center bg-light p-2 rounded-3 mx-0">
                        <div class="col-4">
                            <span class="small fw-bold text-muted d-block" style="font-size: 10px;">ҮНЭ:</span>
                            <input type="number" class="form-control form-control-sm border-primary fw-bold text-primary" value="${price}" onchange="updateItemPrice(${i}, this.value)">
                        </div>
                        
                        <div class="col-4">
                            <span class="small fw-bold text-muted d-block" style="font-size: 10px;">ТОО:</span>
                            <div class="input-group input-group-sm">
                                <button class="btn btn-outline-secondary px-1" onclick="updateQty(${i}, -1)"><i class="bi bi-dash"></i></button>
                                <input type="number" class="form-control form-control-sm text-center px-0 fw-bold" value="${qty}" onchange="changeQty(${i}, this.value)">
                                <button class="btn btn-outline-secondary px-1" onclick="updateQty(${i}, 1)"><i class="bi bi-plus"></i></button>
                            </div>
                        </div>

                        <div class="col-4 text-end">
                            <span class="small fw-bold text-muted d-block" style="font-size: 10px;">НИЙТ:</span>
                            <div class="fw-bold text-dark">${subtotal.toLocaleString()}₮</div>
                        </div>
                    </div>
                </div>`;
        }).join('');

        document.getElementById('total-qty').innerText = totalQty.toLocaleString();
        document.getElementById('total-price').innerText = totalPrice.toLocaleString() + '₮';
    }

    function remove(i) {
        let cart = JSON.parse(localStorage.getItem('myCart')) || [];
        cart.splice(i, 1);
        localStorage.setItem('myCart', JSON.stringify(cart));
        render();
        if (window.updateBadge) window.updateBadge();
    }

    function clearAll() {
        if(confirm("Сагсыг цэвэрлэх үү?")) {
            localStorage.removeItem('myCart');
            render();
            if (window.updateBadge) window.updateBadge();
        }
    }

    // Төлбөрийн төрлийг дамжуулж хадгалах шинэ функц
    async function saveWithMethod(method) {
        let cart = JSON.parse(localStorage.getItem('myCart')) || [];
        if (cart.length === 0) return;

        let totalPrice = cart.reduce((acc, item) => acc + (parseFloat(item.quantity) * parseFloat(item.price)), 0);
        if(!confirm(`Төлбөр: ${method}\nНийт ${totalPrice.toLocaleString()}₮-ийн тооцоог батлах уу?`)) return;

        // Сагсан дахь бүх барааны төрлийг (Type) сонгосон төлбөрийн хэлбэрээр солих
        const updatedItems = cart.map(item => ({
            ...item,
            type: `Зарлага (${method})`
        }));

        try {
            const res = await fetch('/add_transaction_bulk', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ items: updatedItems })
            });

            if(res.ok) {
                localStorage.removeItem('myCart');
                alert(`Амжилттай бүртгэгдлээ! (${method})`);
                window.location.href = "{{ url_for('dashboard') }}";
            } else {
                const err = await res.json();
                alert("Серверийн алдаа: " + (err.message || "Мэдээлэл дутуу байна"));
            }
        } catch (e) {
            alert("Холболтын алдаа гарлаа!");
        }
    }

    document.addEventListener('DOMContentLoaded', render);
</script>
{% endblock %}
