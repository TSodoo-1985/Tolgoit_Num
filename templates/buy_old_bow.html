{% extends "layout.html" %}
{% block content %}
<div class="container mt-4">
    <div class="card border-0 shadow-sm rounded-4 p-4" style="max-width: 800px; margin: auto;">
        <h4 class="fw-bold mb-4 text-success">
            <i class="bi bi-recycle me-2"></i>Хуучин нум худалдаж авах
        </h4>
        
        <div class="alert alert-info d-flex align-items-center rounded-3">
            <i class="bi bi-info-circle-fill me-2 fs-4"></i>
            <div>
                Энд бүртгэсэн мөнгөн дүн <strong>Кассын зарлага</strong> болж хасагдана. <br>
                Мөн агуулахын <strong>"Хуучин нум"</strong> ангилалд бараа болж орно.
            </div>
        </div>

        <form method="POST">
            <div class="row g-3">
                <div class="col-md-12">
                    <label class="form-label fw-bold">Манайд бүртгэлтэй хуучин нумнаас сонгох</label>
                    <select name="product_id" id="productSelect" class="form-select form-select-lg border-success-subtle shadow-sm" onchange="handleBowSelection()">
                        <option value="">-- Жагсаалтаас сонгох --</option>
                        {% for p in products %}
                        <option value="{{ p.id }}" 
                                data-sku="{{ p.sku }}" 
                                data-retail="{{ p.price }}" 
                                data-cost="{{ p.cost_price }}">
                            {{ p.name }} ({{ p.sku }})
                        </option>
                        {% endfor %}
                        <option value="other" class="text-primary fw-bold">++ Жагсаалтад байхгүй (Гараар бичих) ++</option>
                    </select>
                </div>

                <div id="manualInputArea" class="col-md-6" style="display: none;">
                    <label class="form-label fw-bold text-primary">Нумын нэр (Шинээр)</label>
                    <input type="text" name="name" id="manualName" class="form-control" placeholder="Жишээ: Prius 20 нум">
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold">Код (SKU)</label>
                    <input type="text" name="sku" id="targetSku" class="form-control">
                </div>
                
                <div class="col-md-4">
                    <label class="form-label fw-bold text-danger">Авсан үнэ (Өртөг)</label>
                    <div class="input-group">
                        <input type="number" name="cost_price" id="targetCost" class="form-control" required>
                        <span class="input-group-text">₮</span>
                    </div>
                </div>
                
                <div class="col-md-4">
                    <label class="form-label fw-bold text-success">Зарах үнэ</label>
                    <div class="input-group">
                        <input type="number" name="retail_price" id="targetRetail" class="form-control" required>
                        <span class="input-group-text">₮</span>
                    </div>
                </div>
                
                <div class="col-md-4">
                    <label class="form-label fw-bold">Тоо ширхэг</label>
                    <input type="number" name="stock" value="1" min="1" class="form-control" required>
                </div>
            </div>

            <hr class="my-4">
            
            <button type="submit" class="btn btn-success w-100 py-3 fw-bold rounded-3 fs-5">
                <i class="bi bi-check-circle-fill me-2"></i>Худалдаж авах / Бүртгэх
            </button>
        </form>
    </div>
</div>

<script>
// buy_old_bow.html доторх JS хэсэгт:
function handleBowSelection() {
    const select = document.getElementById('productSelect');
    const selectedOption = select.options[select.selectedIndex];
    
    const targetSku = document.getElementById('targetSku');
    const targetCost = document.getElementById('targetCost');
    const targetRetail = document.getElementById('targetRetail');

    if (select.value === 'other') {
        document.getElementById('manualInputArea').style.display = 'block';
        // Утгуудыг цэвэрлэх
        targetSku.value = ''; targetCost.value = ''; targetRetail.value = '';
    } else if (select.value !== "") {
        document.getElementById('manualInputArea').style.display = 'none';
        // Утгуудыг автоматаар бөглөх
        targetSku.value = selectedOption.getAttribute('data-sku') || '';
        targetCost.value = selectedOption.getAttribute('data-cost') || '';
        targetRetail.value = selectedOption.getAttribute('data-retail') || ''; // Энд 'data-retail' байгааг шалгаарай
    }
}
</script>
{% endblock %}
